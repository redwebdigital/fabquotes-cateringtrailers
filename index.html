<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>1 Page Website Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <div class="max-w-3xl mx-auto p-6 mt-10 bg-white shadow rounded">
    <h1 class="text-3xl font-bold mb-6 text-center">1 Page Website Builder</h1>

    <form id="builder-form" class="space-y-4">
      <input type="text" id="bizName" placeholder="Business Name" required class="w-full p-3 border rounded" />
      <input type="text" id="services" placeholder="Services Offered" required class="w-full p-3 border rounded" />
      <input type="text" id="contact" placeholder="Contact Info" required class="w-full p-3 border rounded" />
      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded hover:bg-green-700">Generate Website</button>
    </form>

    <div class="mt-8">
      <h2 class="text-xl font-semibold mb-2">Preview</h2>
      <iframe id="preview" class="w-full h-96 border rounded"></iframe>
      <a id="downloadLink" class="mt-4 inline-block bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700" download="my-website.html">Download Website</a>
    </div>
  </div>

  <script src="builder.js"></script>
</body>
</html>
